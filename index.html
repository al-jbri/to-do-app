<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Simple To-Do App to manage daily tasks" />
    <meta name="author" content="Ahmed Al-Jbri" />
    <meta name="theme-color" content="#ffffff" />
    <title>To-Do App</title>

    <link rel="stylesheet" href="style/variables.css" />
    <link rel="stylesheet" href="style/layout.css" />
    <link rel="stylesheet" href="style/add-form.css" />
    <link rel="stylesheet" href="style/tasks.css" />
    <link rel="stylesheet" href="style/clear-tasks.css" />
    <link rel="stylesheet" href="style/responsive.css" />

    <script src="main.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1 class="title">To-Do App</h1>
    </header>

    <main class="tasks-container" id="tasks-container">
      <section class="column must" aria-labelledby="header-must">
        <h2 id="header-must" class="column-header must">Must</h2>

        <img
          role="button"
          tabindex="0"
          src="res/clear.svg"
          alt="Clear Tasks"
          class="clear-tasks"
          id="must-clear-task"
        />

        <div id="must-container" class="container"></div>
        <form class="add-task" novalidate>
          <input
            type="text"
            class="title-input"
            id="title-input"
            name="taskTitle"
            placeholder="What needs to be done?"
            aria-label="Task Title"
            required
          />

          <button type="submit" class="add-btn" aria-label="Add Task">
            <span class="icon">+</span><span>Add</span>
          </button>
        </form>
      </section>

      <section class="column should" aria-labelledby="header-should">
        <h2 id="header-should" class="column-header should">Should</h2>

        <img
          role="button"
          tabindex="0"
          src="res/clear.svg"
          alt="Clear Tasks"
          class="clear-tasks"
          id="should-clear-task"
        />

        <div id="should-container" class="container"></div>
        <form class="add-task" novalidate>
          <input
            type="text"
            class="title-input"
            id="title-input"
            name="taskTitle"
            placeholder="What needs to be done?"
            aria-label="Task Title"
            required
          />

          <button type="submit" class="add-btn" aria-label="Add Task">
            <span class="icon">+</span><span>Add</span>
          </button>
        </form>
      </section>

      <section class="column could" aria-labelledby="header-could">
        <h2 id="header-could" class="column-header could">Could</h2>

        <img
          role="button"
          tabindex="0"
          src="res/clear.svg"
          alt="Clear Tasks"
          class="clear-tasks"
          id="could-clear-task"
        />

        <div id="could-container" class="container"></div>
        <form class="add-task" novalidate>
          <input
            type="text"
            class="title-input"
            id="title-input"
            name="taskTitle"
            placeholder="What needs to be done?"
            aria-label="Task Title"
            required
          />

          <button type="submit" class="add-btn" aria-label="Add Task">
            <span class="icon">+</span><span>Add</span>
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
